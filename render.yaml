# Render.com blueprint
services:
  - type: web
    name: settlers-of-lechia
    env: node
    plan: free
    buildCommand: npm run install:all && npm run build
    startCommand: npm start
    envVars:
      # Force npm to install devDependencies during build (vite is a devDep).
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: NODE_VERSION
        value: "20"
